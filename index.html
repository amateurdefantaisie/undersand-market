<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undersand Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        .coins-display { background: gold; color: #333; padding: 15px 30px; border-radius: 50px; font-size: 1.3em; font-weight: bold; margin: 20px 0; }
        .section { background: rgba(255,255,255,0.95); margin: 20px 0; padding: 30px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        button { 
            background: #4CAF50; color: white; border: none; padding: 15px 30px; 
            border-radius: 50px; cursor: pointer; font-size: 1.1em; margin: 10px; 
            transition: all 0.3s; 
        }
        button:hover { transform: scale(1.05); background: #45a049; }
        button:disabled { background: #ccc; transform: none; }
        .premium { background: linear-gradient(45deg, #FF6B6B, #FF8E53) !important; }
        .packages { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        #active-ads, .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .ad-card, .product-card { background: #f8f9fa; padding: 25px; border-radius: 15px; text-align: center; border-left: 5px solid #4CAF50; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .survey-option { display: block; width: 100%; margin: 15px 0; padding: 20px; background: #2196F3; color: white; border: none; border-radius: 15px; cursor: pointer; font-size: 1.1em; }
        .survey-option:hover { background: #1976D2; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Undersand Market</h1>
            <p>Marketplace + Système Pièces & Publicités</p>
            <div class="coins-display">
                💰 <span id="coin-count">0</span> pièces | 📊 <span id="surveys-done">0</span>/10 sondages aujourd'hui
            </div>
        </header>

        <!-- SONDAGES -->
        <section class="section">
            <h2>📊 Gagnez 10 pièces GRATUITES par jour</h2>
            <p>1 sondage = 1 pièce (max 10/jour, >100 sondages en stock)</p>
            <button id="do-survey">🔄 Faire un sondage aléatoire</button>
            <div id="survey-result" style="margin-top:20px; font-weight:bold;"></div>
        </section>

        <!-- E-COMMERCE -->
        <section class="section">
            <h2>🛍️ Boutique</h2>
            <div id="products" class="product-grid"></div>
        </section>

        <!-- PUBLICITÉS -->
        <section class="section">
            <h2>📢 Achetez de la visibilité avec vos pièces</h2>
            <div class="packages">
                <button class="pkg-btn" data-p="10" data-d="1">10p = 24h</button>
                <button class="pkg-btn" data-p="50" data-d="7">50p = 7 jours</button>
                <button class="pkg-btn" data-p="120" data-d="15">120p = 15 jours</button>
                <button class="pkg-btn premium" data-p="300" data-d="30">300p = 30j + Support</button>
                <button class="pkg-btn premium" data-p="500" data-d="90">500p = 90j PREMIUM</button>
            </div>
            <div id="my-ads" class="product-grid"></div>
        </section>
    </div>

    <!-- MODAL SONDAGE -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="survey-q"></h3>
            <div id="survey-opts"></div>
            <button onclick="closeModal()" style="background:#f44336;color:white;border:none;padding:15px 30px;border-radius:25px;cursor:pointer;margin-top:20px;">✕ Fermer</button>
        </div>
    </div>

    <script>
        // TOUT LE CODE EN UN BLOC (AUCUN BUG)
        (function() {
            // Données
            const surveys = [
                {q:"Bleu ou Rouge?", o:["🔵 Bleu", "🔴 Rouge"]},
                {q:"Smartphone Android ou iPhone?", o:["🤖 Android", "🍎 iPhone"]},
                {q:"Préférez-vous le matin ou soir?", o:["🌅 Matin", "🌙 Soir"]},
                {q:"Sport ou Netflix?", o:["🏃 Sport", "📺 Netflix"]},
                {q:"Chat ou Chien?", o:["😺 Chat", "🐶 Chien"]},
                // Ajoute 95 autres...
            ];
            const products = [
                {name:"T-Shirt Undersand", price:29.99, img:"https://via.placeholder.com/280x200/4CAF50/fff?text=T-Shirt"},
                {name:"Casquette Premium", price:19.99, img:"https://via.placeholder.com/280x200/2196F3/fff?text=Casquette"},
                {name:"Mug Gamer", price:12.99, img:"https://via.placeholder.com/280x200/FF5722/fff?text=Mug"}
            ];

            // État
            let coins = parseInt(localStorage.getItem('coins')) || 0;
            let surveysToday = parseInt(localStorage.getItem('surveys_' + new Date().toDateString())) || 0;
            let ads = JSON.parse(localStorage.getItem('ads')) || [];

            // UI
            function updateUI() {
                document.getElementById('coin-count').textContent = coins;
                document.getElementById('surveys-done').textContent = surveysToday;
                document.getElementById('do-survey').disabled = surveysToday >= 10;
            }

            // Rendu
            function renderProducts() {
                document.getElementById('products').innerHTML = products.map(p =>
                    `<div class="product-card">
                        <img src="${p.img}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
                        <h4>${p.name}</h4>
                        <p>€${p.price}</p>
                        <button onclick="alert('🛒 Ajouté au panier!')">Acheter</button>
                    </div>`
                ).join('');
            }

            function renderAds() {
                const active = ads.filter(a => a.expiry > Date.now());
                document.getElementById('my-ads').innerHTML = active.map(a =>
                    `<div class="ad-card">
                        <strong>${a.content}</strong><br>
                        <small>${Math.ceil((a.expiry-Date.now())/86400000)} jours restants<br>${a.p} pièces</small>
                    </div>`
                ).join('') || '<p>Aucune pub active</p>';
            }

            // SONDAGE
            document.getElementById('do-survey').onclick = function() {
                if (surveysToday >= 10) return alert('❌ Max 10/jour');
                const s = surveys[Math.floor(Math.random()*surveys.length)];
                document.getElementById('survey-q').textContent = s.q;
                document.getElementById('survey-opts').innerHTML = s.o.map(o =>
                    `<button class="survey-option" onclick="completeSurvey()">${o}</button>`
                ).join('');
                document.getElementById('modal').style.display = 'block';
            };

            function completeSurvey() {
                coins++; surveysToday++;
                localStorage.setItem('coins', coins);
                localStorage.setItem('surveys_' + new Date().toDateString(), surveysToday);
                document.getElementById('modal').style.display = 'none';
                updateUI();
                alert('✅ +1 pièce! (' + surveysToday + '/10)');
            }

            // PACKS PUBS
            document.querySelectorAll('.pkg-btn').forEach(btn => {
                btn.onclick = function() {
                    const p = parseInt(this.dataset.p), d = parseInt(this.dataset.d);
                    if (coins < p) return alert('❌ Pas assez de pièces');
                    const content = prompt('📝 Votre pub (max 100 caractères):');
                    if (content && content.length <= 100) {
                        coins -= p;
                        ads.unshift({content, p, expiry: Date.now() + d*86400000});
                        localStorage.setItem('coins', coins);
                        localStorage.setItem('ads', JSON.stringify(ads));
                        updateUI();
                        renderAds();
                        alert(`✅ Pub active ${d} jours!`);
                    }
                };
            });

            // Fermer modal
            function closeModal() { document.getElementById('modal').style.display = 'none'; }

            // INIT
            updateUI();
            renderProducts();
            renderAds();
            console.log('✅ Undersand Market chargé!');
        })();
    </script>
</body>
</html>
