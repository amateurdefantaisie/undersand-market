<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Undersand Market</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 24px; padding: 3rem; max-width: 400px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
    h1 { text-align: center; font-size: 2.2rem; font-weight: 900; background: linear-gradient(45deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #374151; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 1rem; transition: all 0.3s; }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    .btn { width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 600; border-radius: 12px; border: none; background: linear-gradient(45deg, #4f46e5, #7c3aed); color: white; cursor: pointer; transition: all 0.3s; margin-bottom: 1rem; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 15px 30px rgba(79,70,229,0.4); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; }
    .links { text-align: center; margin-top: 2rem; }
    .links a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Créer un compte</h1>
    <form id="registerForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="ton@email.com">
        <div id="emailError" class="error"></div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" required placeholder="Ton mot de passe sécurisé">
        <div id="passwordError" class="error"></div>
      </div>
      <button type="submit" class="btn" id="registerBtn">
        S'inscrire <span id="spinner" class="spinner" style="display:none;"></span>
      </button>
    </form>
    <div id="successMsg" style="display:none; text-align:center; color:#10b981; font-weight:600; margin-top:1rem;">
      ✅ Compte créé ! Redirection...
    </div>
    <div class="links">
      Déjà un compte ? <a href="/login.html">Se connecter</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';

    // ⚠️ REMPLACE PAR TES CONFIGS FIREBASE (Project Settings > SDK setup)
    const firebaseConfig = {
      apiKey: "AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
      authDomain: "harry-undersand.firebaseapp.com",
      projectId: "harry-undersand",
      storageBucket: "harry-undersand.firebasestorage.app",
      messagingSenderId: "1008823909561",
      appId: "1:1008823909561:web:9a8b4b46cab592972f6f68"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById('registerForm');
    const btn = document.getElementById('registerBtn');
    const spinner = document.getElementById('spinner');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => window.location.href = '/dashboard.html', 1500);
      } catch (error) {
        console.error(error);
        document.getElementById('emailError').textContent = error.message;
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
